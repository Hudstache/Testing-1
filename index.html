<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="theme-color" content="#102344">

<meta
    name="apple-mobile-web-app-capable"
    content="yes"
>

<meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
>

<meta
    name="apple-mobile-web-app-title"
    content="Archipelago Adventure"
>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0,
        maximum-scale=1.0, user-scalable=no"
    >

    <title>Archipelago Adventure</title>

<link rel="stylesheet" href="css/menu.css">
</head>

<body>
    <main class="game-menu">

        <!-- Decorative stars -->
        <div class="star star-1"></div>
        <div class="star star-2"></div>
        <div class="star star-3"></div>
        <div class="star star-4"></div>
        <div class="star star-5"></div>

        <!-- Clouds -->
        <div class="cloud cloud-1">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="cloud cloud-2">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <!-- Island decoration -->
        <div class="island-decoration">
            <div class="palm-tree">
                <div class="palm-trunk"></div>
                <div class="palm-leaf leaf-1"></div>
                <div class="palm-leaf leaf-2"></div>
                <div class="palm-leaf leaf-3"></div>
                <div class="palm-leaf leaf-4"></div>
            </div>

            <div class="island-grass"></div>
            <div class="island-sand"></div>
        </div>

        <!-- Main menu -->
        <section class="menu-content">
            <header class="title-area">
                <h1 class="game-title">
                    <span>Archipelago</span>
                    <span>Adventure</span>
                </h1>

                <p class="subtitle">
                    Explore the unknown seas
                </p>
            </header>

            <nav class="menu-buttons" aria-label="Main menu">
                <button
                    type="button"
                    class="menu-button selected"
                    data-action="select-game"
                >
                    <span class="selector">▶</span>
                    Select Game
                </button>

                <button
                    type="button"
                    class="menu-button"
                    data-action="settings"
                >
                    <span class="selector">▶</span>
                    Settings
                </button>

                <button
                    type="button"
                    class="menu-button"
                    data-action="quit"
                >
                    <span class="selector">▶</span>
                    Quit
                </button>
            </nav>

            <p class="controls">
                ↑ ↓ Navigate &nbsp; • &nbsp; Enter Select
            </p>

            <p
                id="status-message"
                class="status-message"
                aria-live="polite"
            ></p>
        </section>

        <!-- Moving ocean -->
        <div class="ocean ocean-back"></div>
        <div class="ocean ocean-front"></div>

        <!-- Select game window -->
        <section
            id="game-panel"
            class="popup hidden"
            aria-hidden="true"
        >
            <div class="popup-window">
                <h2>Select Game</h2>

                <button
                    type="button"
                    class="save-slot"
                    data-slot="1"
                >
                    <strong>Save Slot 1</strong>
                    <span>New Adventure</span>
                </button>

                <button
                    type="button"
                    class="save-slot locked"
                    disabled
                >
                    <strong>Save Slot 2</strong>
                    <span>Locked</span>
                </button>

                <button
                    type="button"
                    class="save-slot locked"
                    disabled
                >
                    <strong>Save Slot 3</strong>
                    <span>Locked</span>
                </button>

                <button
                    id="close-game-panel"
                    type="button"
                    class="back-button"
                >
                    Back
                </button>
            </div>
        </section>

        <!-- Settings window -->
        <section
            id="settings-panel"
            class="popup hidden"
            aria-hidden="true"
        >
            <div class="popup-window">
                <h2>Settings</h2>

                <label class="setting-row">
                    <span>Music</span>
                    <input
                        id="music-setting"
                        type="checkbox"
                        checked
                    >
                </label>

                <label class="setting-row">
                    <span>Sound Effects</span>
                    <input
                        id="sound-setting"
                        type="checkbox"
                        checked
                    >
                </label>

                <label class="setting-row volume-setting">
                    <span>Volume</span>
                    <input
                        id="volume-setting"
                        type="range"
                        min="0"
                        max="100"
                        value="70"
                    >
                </label>

                <button
                    id="close-settings-panel"
                    type="button"
                    class="back-button"
                >
                    Back
                </button>
            </div>
        </section>

    </main>

<script src="js/menu.js"></script>
</body>
</html>
