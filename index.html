<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Archipelago Adventure</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;

            overflow: hidden;

            background: linear-gradient(
                #102344,
                #205d91,
                #3bb5d8
            );

            color: white;

            font-family:
                "Courier New",
                monospace;
        }

        main {
            text-align: center;
        }

        h1 {
            margin: 0;

            color: #ffe66a;

            font-size: clamp(42px, 9vw, 86px);
            line-height: 0.9;
            text-transform: uppercase;

            text-shadow:
                5px 0 #101820,
                -5px 0 #101820,
                0 5px #101820,
                0 -5px #101820,
                7px 7px #7b4526;
        }

        p {
            margin-top: 28px;

            font-size: 18px;
            font-weight: bold;

            text-shadow: 3px 3px #101820;
        }
    </style>
</head>

<body>
    <main>
        <h1>
            Archipelago<br>
            Adventure
        </h1>

        <p>Your journey begins here.</p>
    </main>
</body>
</html>
